[skill]
name = "video-optimization"
description = "Optimize video encoding parameters for best quality/size ratio"
version = "0.1.0"
risk_level = "low"
expected_experiments = 15

[parameters]
# Video codec to test
codecs = ["h264", "h265", "av1"]

# CRF (Constant Rate Factor) range: lower = better quality, larger file
crf_min = 18
crf_max = 28
crf_step = 2

# Preset: encoding speed vs compression efficiency
presets = ["slow", "medium", "fast"]

# Resolution targets
resolutions = ["1080p", "720p", "480p"]

[metrics]
# Primary metric: VMAF score (video quality)
primary = "vmaf_score"

# Secondary metrics
file_size_mb = "lower_is_better"
encoding_time_s = "lower_is_better"
bitrate_kbps = "lower_is_better"

[constraints]
# Maximum encoding time per experiment
max_encoding_time = 300  # 5 minutes

# Maximum file size (MB)
max_file_size = 100
